<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enabler — Breaking communication barriers through AI accessibility tools for speech, sign language, and live conversations."
    />
    <title>Enabler — AI Accessibility Tools</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#app-main">Skip to main content</a>

    <header class="site-header" role="banner">
      <nav class="nav" aria-label="Main navigation">
        <a class="nav-brand" href="#/" aria-label="Enabler home">
          <img
            src="assets/logo-light.svg"
            alt="Enabler"
            class="nav-logo-img"
            data-logo
            width="160"
            height="38"
          />
        </a>

        <div class="nav-center" id="nav-center">
          <a href="#/" class="nav-link" data-route="home">Home</a>
          <a href="#/speech-sign" class="nav-link" data-route="speech-sign">Speech → Sign</a>
          <a href="#/sign-text" class="nav-link" data-route="sign-text">Sign → Text</a>
          <a href="#/live" class="nav-link" data-route="live">Live</a>
          <a href="#/video" class="nav-link" data-route="video">Video</a>
        </div>

        <div class="nav-actions">
          <button
            class="btn btn-ghost btn-icon-only"
            id="sidebar-toggle"
            type="button"
            aria-label="Toggle sidebar"
          >
            ☰
          </button>
          <button
            class="btn btn-ghost btn-icon-only"
            id="theme-toggle"
            type="button"
            aria-label="Switch to dark mode"
          >
            🌙
          </button>
          <a href="#/emergency" class="btn btn-primary btn-sm">Emergency</a>
          <button
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="nav-center"
            aria-label="Open menu"
          >
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </button>
        </div>
      </nav>
    </header>

    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar" aria-label="Feature navigation">
        <p class="sidebar-label">Tools</p>
        <ul class="sidebar-nav"></ul>
      </aside>

      <main class="app-main" id="app-main" tabindex="-1"></main>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="js/utils/state.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/router.js"></script>
    <script src="js/views/home.js"></script>
    <script src="js/views/speech-sign.js"></script>
    <script src="js/views/sign-text.js"></script>
    <script src="js/views/live.js"></script>
    <script src="js/views/video.js"></script>
    <script src="js/views/emergency.js"></script>
    <script src="js/views/alerts.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
